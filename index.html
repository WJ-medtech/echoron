<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エコロン - ログイン</title>

<!-- PWA設定：ホーム画面に追加した時にアプリっぽく開くための設定 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1b2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="エコロン">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/favicon-32x32.png" sizes="32x32">
<link rel="icon" href="icons/favicon-16x16.png" sizes="16x16">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0d1b2a;
    color: #e6f1fb;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #15263b;
    border-radius: 20px;
    padding: 28px 24px;
    border: 1px solid #234058;
  }
  h1 {
    font-size: 20px;
    text-align: center;
    margin: 0 0 4px;
  }
  .sub {
    text-align: center;
    font-size: 13px;
    color: #8fb3d4;
    margin: 0 0 24px;
  }
  .tabs {
    display: flex;
    background: #0d1b2a;
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: transparent;
    color: #8fb3d4;
    border-radius: 9px;
    font-size: 14px;
    cursor: pointer;
  }
  .tab-btn.active {
    background: #1d9e75;
    color: #ffffff;
  }
  .panel { display: none; }
  .panel.active { display: block; }
  label {
    display: block;
    font-size: 13px;
    color: #8fb3d4;
    margin: 14px 0 6px;
  }
  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #234058;
    background: #0d1b2a;
    color: #e6f1fb;
    font-size: 15px;
  }
  input[type="file"] {
    width: 100%;
    color: #8fb3d4;
    font-size: 13px;
  }
  .avatar-preview {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin: 12px auto 4px;
    display: block;
    object-fit: cover;
    background: #0d1b2a;
    border: 1px solid #234058;
  }
  button.submit {
    width: 100%;
    margin-top: 20px;
    padding: 13px 0;
    border: none;
    border-radius: 10px;
    background: #1d9e75;
    color: #ffffff;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }
  button.submit:disabled {
    opacity: 0.5;
  }
  .msg {
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }
  .msg.error { color: #f0997b; }
  .msg.ok { color: #5dcaa5; }

  /* ホーム画面追加バナー */
  #install-banner {
    position: fixed;
    left: 16px;
    right: 16px;
    bottom: 16px;
    max-width: 380px;
    margin: 0 auto;
    background: #15263b;
    border: 1px solid #234058;
    border-radius: 16px;
    padding: 16px;
    display: none;
    align-items: center;
    gap: 12px;
    z-index: 999;
  }
  #install-banner.show { display: flex; }
  #install-banner img {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    flex-shrink: 0;
  }
  #install-banner .text {
    flex: 1;
    font-size: 12.5px;
    line-height: 1.5;
    color: #cfe3f5;
  }
  #install-banner .actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #install-banner button {
    border: none;
    border-radius: 8px;
    font-size: 12px;
    padding: 6px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  #install-add-btn { background: #1d9e75; color: #fff; }
  #install-close-btn { background: transparent; color: #8fb3d4; }
</style>
</head>
<body>

<div class="card">
  <h1>エコロン</h1>
  <p class="sub">echo clinical reasoning</p>

  <div id="auth-tabs" class="tabs">
    <button class="tab-btn active" data-tab="login">ログイン</button>
    <button class="tab-btn" data-tab="signup">新規登録</button>
  </div>

  <!-- ログイン -->
  <div id="panel-login" class="panel active">
    <label>メールアドレス</label>
    <input type="email" id="login-email" placeholder="you@example.com">
    <label>パスワード</label>
    <input type="password" id="login-password" placeholder="••••••••">
    <button class="submit" id="login-btn">ログイン</button>
    <p class="msg" id="login-msg"></p>
  </div>

  <!-- 新規登録 -->
  <div id="panel-signup" class="panel">
    <label>メールアドレス</label>
    <input type="email" id="signup-email" placeholder="you@example.com">
    <label>パスワード（6文字以上）</label>
    <input type="password" id="signup-password" placeholder="••••••••">
    <button class="submit" id="signup-btn">登録する</button>
    <p class="msg" id="signup-msg"></p>
  </div>

  <!-- プロフィール設定（初回ログイン時のみ表示） -->
  <div id="panel-profile" class="panel">
    <img id="avatar-preview" class="avatar-preview" alt="プレビュー">
    <label>アイコン画像（任意）</label>
    <input type="file" id="profile-avatar" accept="image/*">
    <label>ペンネーム（必須）</label>
    <input type="text" id="profile-penname" placeholder="例: たろう">
    <label>所属団体（任意）</label>
    <input type="text" id="profile-org" list="org-options" placeholder="例: K-PICS">
    <datalist id="org-options"></datalist>
    <button class="submit" id="profile-btn">これで始める</button>
    <p class="msg" id="profile-msg"></p>
  </div>
</div>

<!-- ホーム画面に追加する案内バナー -->
<div id="install-banner">
  <img src="icons/icon-192x192.png" alt="エコロンアイコン">
  <div class="text" id="install-text"></div>
  <div class="actions">
    <button id="install-add-btn" style="display:none;">追加する</button>
    <button id="install-close-btn">閉じる</button>
  </div>
</div>

<script>
(function () {

// ===== Supabase接続設定 =====
const SUPABASE_URL = 'https://orivksorinurtroylafo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_dtVfIO94YNYyLAR2K1-WFw_e-hz4jDy';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// アイコン未設定時のデフォルト画像（病院アイコン、SVGをそのまま埋め込み）
const DEFAULT_AVATAR = 'data:image/svg+xml;utf8,' + encodeURIComponent(`
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <rect width="80" height="80" fill="#234058"/>
  <rect x="30" y="14" width="20" height="52" fill="#5dcaa5"/>
  <rect x="14" y="34" width="52" height="20" fill="#5dcaa5"/>
</svg>`);

const HOME_PAGE = 'home.html';

// ---- タブ切り替え ----
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (type || '');
}

// ---- 新規登録 ----
document.getElementById('signup-btn').addEventListener('click', async () => {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!email || password.length < 6) {
    showMsg('signup-msg', 'メールアドレスとパスワード（6文字以上）を入力してください', 'error');
    return;
  }
  const { error } = await supabaseClient.auth.signUp({ email, password });
  if (error) {
    showMsg('signup-msg', 'エラー: ' + error.message, 'error');
    return;
  }
  showMsg('signup-msg', '確認メールを送りました。メール内のリンクを押してから、ログインタブでログインしてください。', 'ok');
});

// ---- ログイン ----
document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) {
    showMsg('login-msg', 'メールアドレスとパスワードを入力してください', 'error');
    return;
  }
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg('login-msg', 'エラー: ' + error.message, 'error');
    return;
  }
  await checkProfileAndProceed(data.user.id);
});

async function checkProfileAndProceed(userId) {
  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('id')
    .eq('id', userId)
    .maybeSingle();

  if (profile) {
    window.location.href = HOME_PAGE;
  } else {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('auth-tabs').style.display = 'none';
    document.getElementById('panel-profile').classList.add('active');
    document.getElementById('avatar-preview').src = DEFAULT_AVATAR;
    loadOrganizations();
  }
}

async function loadOrganizations() {
  const { data } = await supabaseClient.from('organizations').select('name');
  const list = document.getElementById('org-options');
  list.innerHTML = '';
  (data || []).forEach(org => {
    const opt = document.createElement('option');
    opt.value = org.name;
    list.appendChild(opt);
  });
}

document.getElementById('profile-avatar').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    document.getElementById('avatar-preview').src = URL.createObjectURL(file);
  }
});

document.getElementById('profile-btn').addEventListener('click', async () => {
  const penName = document.getElementById('profile-penname').value.trim();
  const orgName = document.getElementById('profile-org').value.trim();
  const fileInput = document.getElementById('profile-avatar');

  if (!penName) {
    showMsg('profile-msg', 'ペンネームを入力してください', 'error');
    return;
  }

  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) {
    showMsg('profile-msg', 'ログイン状態が確認できませんでした。もう一度ログインしてください。', 'error');
    return;
  }

  let organizationId = null;
  if (orgName) {
    const { data: existing } = await supabaseClient
      .from('organizations')
      .select('id')
      .eq('name', orgName)
      .maybeSingle();

    if (existing) {
      organizationId = existing.id;
    } else {
      const { data: created, error: orgError } = await supabaseClient
        .from('organizations')
        .insert({ name: orgName })
        .select('id')
        .single();
      if (orgError) {
        showMsg('profile-msg', '団体の登録に失敗しました: ' + orgError.message, 'error');
        return;
      }
      organizationId = created.id;
    }
  }

  let avatarUrl = null;
  const file = fileInput.files[0];
  if (file) {
    const ext = file.name.split('.').pop();
    const filePath = `${user.id}/avatar.${ext}`;
    const { error: uploadError } = await supabaseClient
      .storage
      .from('avatars')
      .upload(filePath, file, { upsert: true });
    if (uploadError) {
      showMsg('profile-msg', '画像アップロードに失敗しました: ' + uploadError.message, 'error');
      return;
    }
    const { data: publicData } = supabaseClient.storage.from('avatars').getPublicUrl(filePath);
    avatarUrl = publicData.publicUrl;
  }

  const { error: profileError } = await supabaseClient.from('profiles').insert({
    id: user.id,
    pen_name: penName,
    organization_id: organizationId,
    avatar_url: avatarUrl
  });

  if (profileError) {
    showMsg('profile-msg', '登録に失敗しました: ' + profileError.message, 'error');
    return;
  }

  showMsg('profile-msg', '完了しました！ホーム画面に移動します...', 'ok');
  setTimeout(() => { window.location.href = HOME_PAGE; }, 1000);
});

// ================== ホーム画面に追加する案内バナー ==================

function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

function isIOS() {
  return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
}

const STORAGE_KEY = 'echoron_install_banner_dismissed';
let deferredInstallEvent = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallEvent = e;
  showInstallBannerIfNeeded();
});

function showInstallBannerIfNeeded() {
  if (isStandalone()) return;
  if (localStorage.getItem(STORAGE_KEY) === '1') return;

  const banner = document.getElementById('install-banner');
  const text = document.getElementById('install-text');
  const addBtn = document.getElementById('install-add-btn');

  if (isIOS()) {
    text.textContent = 'ホーム画面に追加すると、アプリのように使えます。共有ボタン（□と↑）をタップ →「ホーム画面に追加」を選んでください。';
    addBtn.style.display = 'none';
  } else if (deferredInstallEvent) {
    text.textContent = 'ホーム画面に追加すると、アプリのように使えます。';
    addBtn.style.display = 'inline-block';
  } else {
    return;
  }
  banner.classList.add('show');
}

document.getElementById('install-add-btn').addEventListener('click', async () => {
  if (deferredInstallEvent) {
    deferredInstallEvent.prompt();
    await deferredInstallEvent.userChoice;
    deferredInstallEvent = null;
  }
  document.getElementById('install-banner').classList.remove('show');
  localStorage.setItem(STORAGE_KEY, '1');
});

document.getElementById('install-close-btn').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('show');
  localStorage.setItem(STORAGE_KEY, '1');
});

// iOSはbeforeinstallpromptが発生しないので、少し待ってから案内を出す
if (isIOS()) {
  setTimeout(showInstallBannerIfNeeded, 1500);
}

})();
</script>
</body>
</html>
