<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エコロン - 探す</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a141f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/favicon-32x32.png" sizes="32x32">
<link rel="icon" href="icons/favicon-16x16.png" sizes="16x16">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a141f;
    --surface: #11212f;
    --surface-2: #16293a;
    --line: #1f3a4d;
    --echo: #36e2c4;
    --echo-dim: rgba(54,226,196,0.16);
    --pulse: #ffce6b;
    --text: #eaf6f4;
    --text-dim: #5f88a0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    background-image: radial-gradient(circle at 50% 0%, rgba(54,226,196,0.07), transparent 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    padding-bottom: 90px;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .display { font-family: 'Space Grotesk', sans-serif; }

  .wrap { max-width: 380px; margin: 0 auto; padding: 18px 16px 0; }

  /* ヘッダー */
  .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .page-head h1 { font-size: 20px; margin: 0; }
  .page-head .sub { font-size: 11px; color: var(--text-dim); margin: 2px 0 0; }

  /* 検索バー */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }
  .search-bar .ic { color: var(--text-dim); font-size: 15px; flex-shrink: 0; }
  .search-bar input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
  }
  .search-bar input::placeholder { color: var(--text-dim); }

  /* フィルターチップ */
  .filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 6px;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12.5px;
    cursor: pointer;
    white-space: nowrap;
  }
  .chip.active {
    background: var(--echo-dim);
    border-color: var(--echo);
    color: var(--echo);
    font-weight: 600;
  }

  .sort-row {
    display: flex;
    justify-content: flex-end;
    margin: 10px 0 12px;
  }
  .sort-select {
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 12px;
    border-radius: 10px;
    padding: 6px 10px;
  }

  /* 症例カード一覧 */
  .case-list { display: flex; flex-direction: column; gap: 10px; }
  .case-card {
    display: flex;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px;
    text-decoration: none;
    color: inherit;
  }
  .case-thumb {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    background: var(--surface-2);
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 18px;
  }
  .case-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .case-body { flex: 1; min-width: 0; }
  .case-tags { display: flex; gap: 6px; margin-bottom: 5px; }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .tag.category { background: var(--echo-dim); color: var(--echo); }
  .tag.diff-1 { background: rgba(93,202,165,0.16); color: #5dcaa5; }
  .tag.diff-2 { background: rgba(255,206,107,0.16); color: var(--pulse); }
  .tag.diff-3 { background: rgba(240,151,123,0.16); color: #f0997b; }
  .case-title {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .case-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .case-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-dim); }

  /* 空・ローディング状態 */
  .state-msg {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 60px 20px;
    line-height: 1.7;
  }
  .state-msg .ic { font-size: 26px; display: block; margin-bottom: 10px; opacity: 0.6; }

  /* もっと見る */
  .load-more {
    display: block;
    width: 100%;
    margin-top: 14px;
    padding: 12px 0;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
  }
  .load-more:disabled { opacity: 0.5; }

  /* 下部固定ナビ */
  .navbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-around;
    padding: 10px 4px calc(10px + env(safe-area-inset-bottom));
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 10px;
  }
  .nav-item .ic { font-size: 18px; }
  .nav-item.active { color: var(--echo); }
</style>
</head>
<body>
<div class="wrap">

  <div class="page-head">
    <div>
      <h1 class="display">探す</h1>
      <p class="sub">みんなの症例から選んで診察する</p>
    </div>
  </div>

  <div class="search-bar">
    <span class="ic">⌕</span>
    <input type="text" id="search-input" placeholder="症例名・キーワードで検索">
  </div>

  <div class="filter-row" id="category-filters">
    <button class="chip active" data-category="">すべて</button>
  </div>

  <div class="sort-row">
    <select class="sort-select" id="sort-select">
      <option value="new">新着順</option>
      <option value="popular">人気順</option>
      <option value="difficulty">難易度順</option>
    </select>
  </div>

  <div class="case-list" id="case-list"></div>

  <p class="state-msg" id="state-msg" style="display:none;"></p>

  <button class="load-more" id="load-more-btn" style="display:none;">もっと見る</button>

</div>

<div class="navbar">
  <a href="explore.html" class="nav-item active"><span class="ic">▤</span>探す</a>
  <a href="ranking.html" class="nav-item"><span class="ic">▲</span>ランキング</a>
  <a href="manabiba.html" class="nav-item"><span class="ic">▥</span>まなび場</a>
  <a href="mypage.html" class="nav-item"><span class="ic">●</span>マイページ</a>
</div>

<script>
(function () {
const SUPABASE_URL = 'https://orivksorinurtroylafo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_dtVfIO94YNYyLAR2K1-WFw_e-hz4jDy';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PAGE_SIZE = 12;

const DEFAULT_THUMB_ICON = '◐'; // 画像が無い症例カード用のアイコン

const DIFF_LABEL = { 1: '易', 2: '標準', 3: '難' };

let state = {
  keyword: '',
  category: '',
  sort: 'new',
  page: 0,
  loading: false,
  done: false
};

const listEl = document.getElementById('case-list');
const stateMsgEl = document.getElementById('state-msg');
const loadMoreBtn = document.getElementById('load-more-btn');

function showState(html) {
  stateMsgEl.innerHTML = html;
  stateMsgEl.style.display = 'block';
}
function hideState() {
  stateMsgEl.style.display = 'none';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function renderCase(c) {
  const author = c.profiles ? c.profiles.pen_name : '不明';
  const diffClass = 'diff-' + (c.difficulty || 1);
  const diffLabel = DIFF_LABEL[c.difficulty] || '標準';
  const thumb = c.thumbnail_url
    ? `<img src="${escapeHtml(c.thumbnail_url)}" alt="">`
    : DEFAULT_THUMB_ICON;

  return `
    <a class="case-card" href="solve.html?case_id=${encodeURIComponent(c.id)}">
      <div class="case-thumb">${thumb}</div>
      <div class="case-body">
        <div class="case-tags">
          ${c.category ? `<span class="tag category">${escapeHtml(c.category)}</span>` : ''}
          <span class="tag ${diffClass}">${diffLabel}</span>
        </div>
        <p class="case-title">${escapeHtml(c.title)}</p>
        <div class="case-meta">
          <span>${escapeHtml(author)}</span>
          <span class="dot"></span>
          <span>${c.solved_count || 0}人が診察済</span>
        </div>
      </div>
    </a>
  `;
}

async function loadCategories() {
  const { data, error } = await supabaseClient
    .from('cases')
    .select('category')
    .not('category', 'is', null);

  if (error || !data) return;

  const unique = Array.from(new Set(data.map(r => r.category).filter(Boolean)));
  const wrap = document.getElementById('category-filters');
  unique.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.category = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => selectCategory(cat, btn));
    wrap.appendChild(btn);
  });
}

function selectCategory(cat, btnEl) {
  document.querySelectorAll('#category-filters .chip').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  state.category = cat;
  resetAndLoad();
}

document.querySelector('#category-filters .chip[data-category=""]').addEventListener('click', (e) => {
  selectCategory('', e.currentTarget);
});

document.getElementById('sort-select').addEventListener('change', (e) => {
  state.sort = e.target.value;
  resetAndLoad();
});

let searchTimer = null;
document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.keyword = e.target.value.trim();
    resetAndLoad();
  }, 350);
});

loadMoreBtn.addEventListener('click', () => loadCases(false));

function resetAndLoad() {
  state.page = 0;
  state.done = false;
  listEl.innerHTML = '';
  loadCases(true);
}

async function loadCases(isFirstLoad) {
  if (state.loading || state.done) return;
  state.loading = true;
  loadMoreBtn.disabled = true;
  loadMoreBtn.textContent = '読み込み中...';

  if (isFirstLoad) {
    hideState();
    showState('<span class="ic mono">···</span>読み込み中...');
  }

  let query = supabaseClient
    .from('cases')
    .select('id, title, category, difficulty, thumbnail_url, solved_count, created_at, profiles ( pen_name )')
    .range(state.page * PAGE_SIZE, state.page * PAGE_SIZE + PAGE_SIZE - 1);

  if (state.category) query = query.eq('category', state.category);
  if (state.keyword) query = query.ilike('title', `%${state.keyword}%`);

  if (state.sort === 'new') query = query.order('created_at', { ascending: false });
  if (state.sort === 'popular') query = query.order('solved_count', { ascending: false });
  if (state.sort === 'difficulty') query = query.order('difficulty', { ascending: true });

  const { data, error } = await query;

  state.loading = false;

  if (error) {
    showState('<span class="ic">!</span>症例の読み込みに失敗しました');
    loadMoreBtn.style.display = 'none';
    return;
  }

  if (isFirstLoad) hideState();

  if (!data || data.length === 0) {
    if (isFirstLoad) {
      showState('<span class="ic">◐</span>条件に合う症例が見つかりませんでした<br>検索条件を変えてみてください');
    }
    loadMoreBtn.style.display = 'none';
    state.done = true;
    return;
  }

  listEl.insertAdjacentHTML('beforeend', data.map(renderCase).join(''));

  if (data.length < PAGE_SIZE) {
    state.done = true;
    loadMoreBtn.style.display = 'none';
  } else {
    state.page += 1;
    loadMoreBtn.style.display = 'block';
    loadMoreBtn.disabled = false;
    loadMoreBtn.textContent = 'もっと見る';
  }
}

async function init() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) {
    window.location.href = 'index.html';
    return;
  }
  await loadCategories();
  await loadCases(true);
}

init();
})();
</script>
</body>
</html>
